name: Bug Report
description: Report a reproducible bug
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Please fill in as much detail as possible to help us reproduce and fix the issue."

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / Commit
      placeholder: e.g. v1.2.3 or abc1234

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - Other
